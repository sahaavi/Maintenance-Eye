name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Lint
        run: python -m ruff check backend tests

      - name: Format check
        run: python -m black --check backend tests

      - name: Type check
        run: MYPYPATH=backend python -m mypy backend tests

      - name: Security static analysis
        run: python -m bandit -r backend -f json -o bandit-report.json

      - name: Dependency audit
        run: python -m pip_audit -r backend/requirements.txt -f json -o pip-audit-report.json

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json

  pytest-core:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Run core suites
        run: |
          python -m pytest \
            -m "not e2e and not slow" \
            --junitxml=pytest-core.xml \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-core-artifacts
          path: |
            pytest-core.xml
            coverage.xml

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run E2E suite
        run: |
          python -m pytest -m "e2e" --junitxml=pytest-e2e.xml

      - name: Upload E2E artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-e2e-artifacts
          path: pytest-e2e.xml
