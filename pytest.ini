[pytest]
minversion = 8.0
addopts = -ra --strict-markers --strict-config --cov=backend --cov-report=term-missing --cov-report=xml --cov-fail-under=85
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: unit-level tests
    integration: integration tests across modules
    api: API contract and route tests
    system: system behavior tests
    e2e: browser end-to-end tests
    regression: regression tests for previously fixed defects
    performance: performance and latency tests
    security: security and hardening tests
    ai: AI/LLM validation tests
    data: data integrity and drift tests
    slow: long-running suite
asyncio_mode = auto
testpaths = tests
env =
    APP_ENV=testing
    ENABLE_AUTH=false
    FIRESTORE_EMULATOR_HOST=
    GCP_PROJECT_ID=maintenance-eye-test
    FIRESTORE_DATABASE=(default)
    GCS_BUCKET=
